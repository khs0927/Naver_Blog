name: Check Tistory Session

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TISTORY_BLOG_NAME: ${{ secrets.TISTORY_BLOG_NAME }}
      TISTORY_BLOG_URL: ${{ secrets.TISTORY_BLOG_URL }}
      TISTORY_COOKIE_JSON: ${{ secrets.TISTORY_COOKIE_JSON }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npx playwright install --with-deps chromium
      - run: npm run worker:check-session
