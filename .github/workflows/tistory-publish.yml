name: Tistory Publish Worker

on:
  repository_dispatch:
    types: [publish-post]
  workflow_dispatch:
    inputs:
      jobId:
        description: 'Job ID to publish'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: tistory-gpt-publisher
    env:
      APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
      WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
      TISTORY_BLOG_NAME: ${{ secrets.TISTORY_BLOG_NAME }}
      TISTORY_BLOG_URL: ${{ secrets.TISTORY_BLOG_URL }}
      TISTORY_COOKIE_JSON: ${{ secrets.TISTORY_COOKIE_JSON }}
      TISTORY_DEFAULT_CATEGORY: ${{ secrets.TISTORY_DEFAULT_CATEGORY }}
      JOB_ID: ${{ github.event.client_payload.jobId || inputs.jobId }}
    steps:
      - name: Check required secrets
        id: config
        shell: bash
        run: |
          if [ -z "$APP_BASE_URL" ] || [ -z "$WORKER_SECRET" ] || [ -z "$TISTORY_BLOG_NAME" ] || [ -z "$TISTORY_COOKIE_JSON" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Tistory Publish Worker is not configured yet. Skipping without failure."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.config.outputs.ready == 'true'
      - uses: actions/setup-node@v4
        if: steps.config.outputs.ready == 'true'
        with:
          node-version: 20
      - run: npm install
        if: steps.config.outputs.ready == 'true'
      - run: npx playwright install --with-deps chromium
        if: steps.config.outputs.ready == 'true'
      - run: npm run worker:publish -- --job-id "$JOB_ID"
        if: steps.config.outputs.ready == 'true'
