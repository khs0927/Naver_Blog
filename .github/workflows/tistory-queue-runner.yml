name: Tistory Queue Runner

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  run-due-job:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: tistory-gpt-publisher
    env:
      APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
      WORKER_SECRET: ${{ secrets.WORKER_SECRET }}
      TISTORY_BLOG_NAME: ${{ secrets.TISTORY_BLOG_NAME }}
      TISTORY_BLOG_URL: ${{ secrets.TISTORY_BLOG_URL }}
      TISTORY_COOKIE_JSON: ${{ secrets.TISTORY_COOKIE_JSON }}
      TISTORY_DEFAULT_CATEGORY: ${{ secrets.TISTORY_DEFAULT_CATEGORY }}
    steps:
      - name: Check required secrets
        id: config
        shell: bash
        run: |
          if [ -z "$APP_BASE_URL" ] || [ -z "$WORKER_SECRET" ] || [ -z "$TISTORY_BLOG_NAME" ] || [ -z "$TISTORY_COOKIE_JSON" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Tistory Queue Runner is not configured yet. Skipping without failure."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.config.outputs.ready == 'true'
      - uses: actions/setup-node@v4
        if: steps.config.outputs.ready == 'true'
        with:
          node-version: 20
      - run: npm install
        if: steps.config.outputs.ready == 'true'
      - run: npx playwright install --with-deps chromium
        if: steps.config.outputs.ready == 'true'
      - run: npm run worker:run-due-schedules
        if: steps.config.outputs.ready == 'true'
      - run: npm run worker:publish
        if: steps.config.outputs.ready == 'true'
